name: Build & Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag name for release (e.g. v1.0.0)"
                required: true
                default: "v0.0.0"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write

jobs:
    build-extension-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.11"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build Shared Package
              run: bun run --filter little-shared build

            - name: Build Chrome Extension
              run: bun run build

            - name: Package Release & Generate Checksums
              run: |
                  mkdir -p dist-release

                  VERSION="${{ github.event.inputs.tag || github.ref_name }}"
                  VERSION="${VERSION#v}"

                  if [ -f "${{ github.workspace }}/dist/manifest.json" ]; then
                    cd "${{ github.workspace }}/dist"
                    zip -r "${{ github.workspace }}/dist-release/Little-Later-${VERSION}.zip" .
                    cd "${{ github.workspace }}/dist-release"
                  else
                    echo "Chrome extension not found!"
                    exit 1
                  fi

                  for file in *; do
                    if [[ -f "$file" && ! "$file" =~ \.sha256$ ]]; then
                      sha256sum "$file" > "${file}.sha256"
                    fi
                  done

                  for file in *; do
                    if [[ -f "$file" && ! "$file" =~ \.sha256$ && "$file" != "checksums.txt" ]]; then
                      sha256sum "$file" >> checksums.txt
                    fi
                  done

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2.4.0
              with:
                  tag_name: ${{ github.event.inputs.tag || github.ref_name }}
                  name: Release ${{ github.event.inputs.tag || github.ref_name }}
                  files: |
                      dist-release/*
                  draft: false
                  prerelease: false
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
